services:
  hakoniwa-perl:
    build:
      context: .
    ports:
      - "8080:80"
    environment:
      HAKONIWA_BASE_URL: "http://localhost:8080"
    volumes:
      - hakoniwa-data:/var/www/hako/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hakoniwa
      POSTGRES_USER: hakoniwa
      POSTGRES_PASSWORD: hakoniwa_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hakoniwa -d hakoniwa"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hakoniwa-data:
  postgres-data:
