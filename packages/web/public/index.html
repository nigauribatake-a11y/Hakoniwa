<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hakoniwa Modern</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Hakoniwa Modern</h1>
        <p id="connectionStatus" class="status">未接続</p>
      </div>
      <div class="api-config">
        <label for="apiBase">API</label>
        <input id="apiBase" type="url" spellcheck="false">
        <button id="refreshButton" type="button" title="再読み込み">更新</button>
        <button id="turnButton" class="primary" type="button" title="ターンを進める">ターン進行</button>
      </div>
    </header>

    <main class="layout">
      <section class="main-panel">
        <div class="section-header">
          <select id="islandSelect" aria-label="島"></select>
          <span id="cellDetails">セル未選択</span>
        </div>
        <div id="stats" class="stats"></div>
        <div id="map" class="map" aria-label="島マップ"></div>
      </section>

      <aside class="side-panel">
        <section class="tool-panel">
          <h2>コマンド</h2>
          <label for="commandSelect">種別</label>
          <select id="commandSelect"></select>
          <div class="form-row">
            <label for="queuePosition">番号</label>
            <input id="queuePosition" type="number" min="0" max="39" step="1">
            <span id="commandCost" class="cost">費用 0</span>
          </div>
          <button id="queueButton" class="primary full" type="button">選択セルに登録</button>
        </section>

        <section class="tool-panel">
          <h2>予約</h2>
          <div id="queue" class="queue"></div>
        </section>

        <section class="tool-panel">
          <h2>ログ</h2>
          <ul id="logs" class="logs"></ul>
        </section>
      </aside>
    </main>

    <dialog id="cellDialog" class="cell-dialog">
      <form method="dialog">
        <div class="dialog-header">
          <strong id="dialogTitle">セル</strong>
          <button type="submit" title="閉じる">閉じる</button>
        </div>
      </form>
      <div id="dialogCommandList" class="dialog-command-list"></div>
    </dialog>

    <script type="module" src="/app.js"></script>
  </body>
</html>
